<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="style.css" type="text/css">
	<title>Sign-up Form</title>
</head>
<body>
	<div id="container">
		<div id="image">
			<img class="cover" src="assets/images/hw.jpg">
			<div class="icon"><img src="assets/images/odin-lined.png"><span class="logo-text">ODIN</span></div>
		</div>
		<div id="form-section">
			<div class="info">This is not a real service! You know you need something like this in your life to help you realize your deepest dreams.Sign up now to get started.</div>
			<div class="info">You know you want to.</div>
			<form action="" method="">
				<legend class="info">Let's do this!</legend>
				<fieldset>
					<div>
						<label for="first_name">FIRST NAME</label>
						<br>
						<input type="text" name="first_name" id="first_name">
					</div>
					<div>
						<label for="last_name">LAST NAME</label>
						<br>
						<input type="text" name="last_name" id="last_name">
					</div>
				</fieldset>
				<fieldset>
					<div>
						<label for="email">EMAIL</label>
						<br>
						<input type="email" name="email" id="email">
					</div>
					<div>
						<label for="phone_number">PHONE NUMBER</label>
						<br>
						<input type="text" name="phone_number" id="phone_number">
					</div>
				</fieldset>
				<fieldset>
					<div>
						<label for="password">PASSWORD</label>
						<br>
						<input type="password" name="password" id="password">
					</div>
					<div>
						<label for="confirm_password">CONFIRM PASSWORD</label>
						<br>
						<input type="password" name="confirm_password" id="confirm_password">
					</div>
				</fieldset>
			</form>
			<button>Create Account</button>
			<div>Already have an account? <a href="#">log in</a></div>
		</div>
	</div>
</body>
</html>
